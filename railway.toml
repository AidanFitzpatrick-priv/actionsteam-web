# Railway — https://docs.railway.com/reference/config-as-code
# Connect this repo in Railway, add a PostgreSQL plugin, then set env vars (see RAILWAY.md).

[build]
builder = "nixpacks"
# install phase already runs npm ci — do not run it again (causes EBUSY on node_modules/.cache)
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Schema applied in scripts/railway-start.js (prisma db push) — not preDeployCommand
